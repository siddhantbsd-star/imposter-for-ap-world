<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AP World: Heimler Edition</title>
    <style>
        :root { 
            --bg: #000000; 
            --panel: #1c1c1e; 
            --text: #f2f2f7; 
            --text-muted: #8e8e93;
            --red: #ff453a; 
            --red-grad: linear-gradient(135deg, #ff453a, #ff6961);
            --green: #32d74b; 
            --green-grad: linear-gradient(135deg, #32d74b, #30db5b);
            --blue: #0a84ff; 
            --blue-grad: linear-gradient(135deg, #0a84ff, #64d2ff);
            --border: #38383a; 
            --card-bg: #2c2c2e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            align-items: center;
        }
        #app { 
            width: 100%; 
            max-width: 450px; 
            background: var(--panel); 
            border-radius: 28px; 
            padding: 30px 25px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
            position: relative;
            overflow: hidden;
        }
        
        /* Smooth Fade Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen { display: none; flex-direction: column; gap: 18px; animation: fadeIn 0.4s ease forwards; }
        .active { display: flex; }
        
        h1 { margin: 0; font-size: 1.8rem; color: white; text-align: center; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; font-weight: 600; margin: 0; }
        .left-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600; }
        
        input, select { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 16px; 
            border-radius: 16px; 
            width: 100%; 
            font-size: 1.05rem; 
            outline: none;
            transition: 0.2s;
            appearance: none;
        }
        input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.3); }
        
        button { 
            background: var(--blue-grad); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 18px; 
            font-size: 1.05rem;
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.15s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:active:not(:disabled) { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        
        .btn-success { background: var(--green-grad); }
        .btn-danger { background: var(--red-grad); }
        .btn-sec { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); box-shadow: none; }
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 35px 20px; 
            border-radius: 22px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        #setup-fields { 
            max-height: 220px; 
            overflow-y: auto; 
            margin: 5px 0; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* Custom Scrollbar */
        #setup-fields::-webkit-scrollbar { width: 6px; }
        #setup-fields::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .player-row { display: flex; gap: 10px; }
        .btn-del { 
            background: rgba(255, 69, 58, 0.1); 
            color: var(--red); 
            width: 55px; 
            border: 1px solid rgba(255, 69, 58, 0.3); 
            padding: 0; 
            border-radius: 16px; 
            font-size: 1.5rem;
            box-shadow: none;
        }
        
        .badge {
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            align-self: center;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="setup" class="screen active">
        <h1>AP WORLD: IMPOSTER</h1>
        <p class="subtitle">CED Core Vocabulary</p>
        
        <select id="unit-select">
            <option value="all">Full Exam Review (Units 1-9)</option>
            <option value="1">Unit 1: The Global Tapestry</option>
            <option value="2">Unit 2: Networks of Exchange</option>
            <option value="3">Unit 3: Land Empires</option>
            <option value="4">Unit 4: Transoceanic Interconnections</option>
            <option value="5">Unit 5: Revolutions</option>
            <option value="6">Unit 6: Consequences of Industrialization</option>
            <option value="7">Unit 7: Global Conflict</option>
            <option value="8">Unit 8: Cold War & Decolonization</option>
            <option value="9">Unit 9: Globalization</option>
        </select>

        <div style="display: flex; gap: 15px;">
            <div style="flex:1">
                <label class="left-label">Min Moles</label>
                <input type="number" id="imp-min" value="1" min="1">
            </div>
            <div style="flex:1">
                <label class="left-label">Max Moles</label>
                <input type="number" id="imp-max" value="1" min="1">
            </div>
        </div>

        <div id="setup-fields"></div>
        <button class="btn-sec" onclick="addField()">+ Add Analyst</button>
        <button class="btn-success" onclick="initGame()">Commence Briefing</button>
    </div>

    <div id="pass" class="screen">
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; padding: 40px 0;">
            <p class="subtitle">Classified Intel For:</p>
            <h1 id="pass-name" style="color: var(--blue); font-size: 2.8rem;"></h1>
            <p style="color: var(--text-muted); text-align: center; font-size: 0.9rem;">Ensure no other agents are looking at your screen.</p>
        </div>
        <button onclick="revealRole()">View My Intel</button>
    </div>

    <div id="secret" class="screen">
        <div id="role-card" class="card" style="min-height: 250px;"></div>
        <button class="btn-sec" onclick="nextSecret()">Intel Secured</button>
    </div>

    <div id="debate" class="screen">
        <div class="badge" id="round-tag">ROUND 1</div>
        <div style="text-align: center; margin: 10px 0;">
            <p class="subtitle">Currently Speaking</p>
            <h1 id="speaker-name" style="color: var(--blue); font-size: 2.5rem; margin-top: 5px;"></h1>
        </div>
        <div class="card" style="padding: 20px;">
            <p style="margin:0; font-weight: 500; line-height: 1.5;">Describe the historical concept without saying any part of its name.</p>
        </div>
        <button onclick="nextSpeaker()">End My Turn</button>
        <button id="vote-btn" class="btn-danger" onclick="showVoting()" style="margin-top:10px;">Call Ejection Vote</button>
        
        <button class="btn-sec" onclick="reset()" style="margin-top:15px; font-size: 0.8rem; padding: 12px; border: none; background: transparent; color: var(--text-muted);">⚠ Emergency Reset</button>
    </div>

    <div id="voting" class="screen">
        <h1>EJECTION PROTOCOL</h1>
        <p class="subtitle">Select Suspected Mole</p>
        <div id="vote-list" class="vote-grid" style="margin-top: 10px;"></div>
        <button class="btn-sec" onclick="showScreen('debate')" style="margin-top: 20px;">Cancel Vote</button>
    </div>

    <div id="result" class="screen">
        <h1 id="res-header">TRIBUNAL RESULTS</h1>
        <div class="card" style="margin: 20px 0;">
            <h2 id="res-name" style="margin: 0; font-size: 2rem;"></h2>
            <div id="res-status" style="font-weight:900; font-size: 1.8rem; margin:10px 0;"></div>
            <p id="res-desc" style="color: var(--text-muted); margin: 0; line-height: 1.4;"></p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button id="btn-keep-going" class="btn-sec" onclick="keepGoing()">Continue Investigation</button>
            <button id="btn-next-round" class="btn-success" onclick="initGame()">Next Keyword</button>
            <button class="btn-sec" onclick="reset()" style="font-size:0.85rem; border: none; background: transparent; color: var(--text-muted);">Quit to Menu</button>
        </div>
    </div>
</div>

<script>
    // 200 Highly-Tested AP World History CED Terms
    const CED_DB = {
        "1": [
            {t:"Song Dynasty", h:"Merit"}, {t:"Filial Piety", h:"Respect"}, {t:"Grand Canal", h:"Waterway"}, 
            {t:"Neo-Confucianism", h:"Syncretic"}, {t:"Champa Rice", h:"Drought"}, {t:"Dar al-Islam", h:"House"}, 
            {t:"House of Wisdom", h:"Baghdad"}, {t:"Seljuk Empire", h:"Turks"}, {t:"Delhi Sultanate", h:"India"}, 
            {t:"Abbasid Caliphate", h:"Golden"}, {t:"Sufism", h:"Mystics"}, {t:"Srivijaya Empire", h:"Strait"}, 
            {t:"Khmer Empire", h:"Angkor"}, {t:"Mali Empire", h:"Sundiata"}, {t:"Mansa Musa", h:"Gold"}, 
            {t:"Mississippian Culture", h:"Mounds"}, {t:"Inca Empire", h:"Andes"}, {t:"Mit'a System", h:"Labor"}, 
            {t:"Aztec Empire", h:"Tenochtitlan"}, {t:"Tribute System", h:"Payment"}, {t:"Feudalism", h:"Decentralized"}, 
            {t:"Serfdom", h:"Tied"}
        ],
        "2": [
            {t:"Silk Roads", h:"Luxury"}, {t:"Kashgar", h:"Oasis"}, {t:"Samarkand", h:"Mosque"}, 
            {t:"Caravanserai", h:"Inn"}, {t:"Paper Money", h:"Flying"}, {t:"Pax Mongolica", h:"Peace"}, 
            {t:"Genghis Khan", h:"Bow"}, {t:"Yuan Dynasty", h:"Kublai"}, {t:"Indian Ocean Trade", h:"Maritime"}, 
            {t:"Monsoon Winds", h:"Seasonal"}, {t:"Astrolabe", h:"Stars"}, {t:"Lateen Sail", h:"Triangle"}, 
            {t:"Swahili City-States", h:"East"}, {t:"Zheng He", h:"Treasure"}, {t:"Trans-Saharan Trade", h:"Sand"}, 
            {t:"Camel Saddle", h:"Hump"}, {t:"Ibn Battuta", h:"Traveler"}, {t:"Marco Polo", h:"Venice"}, 
            {t:"Bubonic Plague", h:"Fleas"}, {t:"Gunpowder", h:"Explosive"}, {t:"Magnetic Compass", h:"North"}, 
            {t:"Diasporic Communities", h:"Merchant"}
        ],
        "3": [
            {t:"Gunpowder Empires", h:"Cannons"}, {t:"Ottoman Empire", h:"Anatolia"}, {t:"Suleiman the Magnificent", h:"Lawgiver"}, 
            {t:"Devshirme", h:"Boys"}, {t:"Janissaries", h:"Elite"}, {t:"Safavid Empire", h:"Shi'a"}, 
            {t:"Mughal Empire", h:"India"}, {t:"Akbar the Great", h:"Tolerant"}, {t:"Qing Dynasty", h:"Manchu"}, 
            {t:"Tokugawa Shogunate", h:"Edo"}, {t:"Samurai", h:"Swords"}, {t:"Divine Right", h:"God"}, 
            {t:"Versailles", h:"Palace"}, {t:"Taj Mahal", h:"Tomb"}, {t:"Tax Farming", h:"Collection"}, 
            {t:"Protestant Reformation", h:"Theses"}, {t:"Martin Luther", h:"Indulgences"}, {t:"Catholic Counter-Reformation", h:"Trent"}, 
            {t:"Jesuits", h:"Society"}, {t:"Sikhism", h:"Punjab"}, {t:"Sunni-Shi'a Split", h:"Succession"}, 
            {t:"Boyars", h:"Nobles"}
        ],
        "4": [
            {t:"Caravel", h:"Ship"}, {t:"Fluyt", h:"Dutch"}, {t:"Carrack", h:"Portugal"}, 
            {t:"Columbian Exchange", h:"Transfer"}, {t:"Mercantilism", h:"Wealth"}, {t:"Joint-Stock Company", h:"Shares"}, 
            {t:"Trading-Post Empire", h:"Coasts"}, {t:"Encomienda System", h:"Grant"}, {t:"Hacienda System", h:"Estate"}, 
            {t:"Chattel Slavery", h:"Property"}, {t:"Middle Passage", h:"Voyage"}, {t:"Casta System", h:"Blood"}, 
            {t:"Peninsulares", h:"Iberian"}, {t:"Creoles", h:"Born"}, {t:"Mestizo", h:"Mixed"}, 
            {t:"Silver Trade", h:"Potosi"}, {t:"Sugar Plantations", h:"Sweet"}, {t:"Vodun", h:"Spirits"}, 
            {t:"Maroon Societies", h:"Runaways"}, {t:"Tokugawa Isolation", h:"Closed"}, {t:"East India Company", h:"Monopoly"}, 
            {t:"Omani-European Rivalry", h:"Conflict"}, {t:"Treaty of Tordesillas", h:"Line"}
        ],
        "5": [
            {t:"The Enlightenment", h:"Reason"}, {t:"John Locke", h:"Rights"}, {t:"Social Contract", h:"Agreement"}, 
            {t:"Nationalism", h:"Identity"}, {t:"American Revolution", h:"Tea"}, {t:"French Revolution", h:"Bastille"}, 
            {t:"Declaration of Rights of Man", h:"Document"}, {t:"Haitian Revolution", h:"Toussaint"}, {t:"Simon Bolivar", h:"Jamaica"}, 
            {t:"Industrial Revolution", h:"Factories"}, {t:"Steam Engine", h:"Watt"}, {t:"Factory System", h:"Division"}, 
            {t:"Fossil Fuels", h:"Coal"}, {t:"Meiji Restoration", h:"Emperor"}, {t:"Adam Smith", h:"Invisible"}, 
            {t:"Capitalism", h:"Laissez-faire"}, {t:"Karl Marx", h:"Manifesto"}, {t:"Socialism", h:"Proletariat"}, 
            {t:"Labor Unions", h:"Strike"}, {t:"Seneca Falls Convention", h:"Women"}, {t:"Taiping Rebellion", h:"Heavenly"}, 
            {t:"Tanzimat Reforms", h:"Ottoman"}
        ],
        "6": [
            {t:"Imperialism", h:"Empire"}, {t:"Social Darwinism", h:"Fittest"}, {t:"Civilizing Mission", h:"Burden"}, 
            {t:"Scramble for Africa", h:"Berlin"}, {t:"King Leopold II", h:"Congo"}, {t:"Settler Colony", h:"Move"}, 
            {t:"Sepoy Mutiny", h:"Cartridge"}, {t:"Export Economy", h:"Raw"}, {t:"Economic Imperialism", h:"Profit"}, 
            {t:"Opium Wars", h:"Treaty"}, {t:"Spheres of Influence", h:"Chunks"}, {t:"Boxer Rebellion", h:"Fists"}, 
            {t:"Cherokee Nation", h:"Tears"}, {t:"Ghost Dance", h:"Shirts"}, {t:"Xhosa Cattle-Killing", h:"Spirits"}, 
            {t:"Mahdist War", h:"Sudan"}, {t:"Monroe Doctrine", h:"Hemisphere"}, {t:"Manifest Destiny", h:"West"}, 
            {t:"Indentured Servitude", h:"Contract"}, {t:"Chinese Exclusion Act", h:"Ban"}, {t:"White Australia Policy", h:"Race"}, 
            {t:"Ethnic Enclaves", h:"Neighborhoods"}
        ],
        "7": [
            {t:"Militarism", h:"Army"}, {t:"Alliance System", h:"Web"}, {t:"Total War", h:"Everyone"}, 
            {t:"Trench Warfare", h:"Mud"}, {t:"Propaganda", h:"Posters"}, {t:"Treaty of Versailles", h:"Guilt"}, 
            {t:"League of Nations", h:"Weak"}, {t:"Great Depression", h:"Stocks"}, {t:"New Deal", h:"FDR"}, 
            {t:"Fascism", h:"State"}, {t:"Totalitarianism", h:"Dictator"}, {t:"Russian Revolution", h:"Lenin"}, 
            {t:"Bolsheviks", h:"Reds"}, {t:"Joseph Stalin", h:"Purge"}, {t:"Five-Year Plans", h:"Quotas"}, 
            {t:"The Holocaust", h:"Shoah"}, {t:"Armenian Genocide", h:"Young"}, {t:"World War II", h:"Axis"}, 
            {t:"Blitzkrieg", h:"Lightning"}, {t:"Atomic Bomb", h:"Trinity"}, {t:"Firebombing", h:"Incendiary"}, 
            {t:"Appeasement", h:"Munich"}
        ],
        "8": [
            {t:"Cold War", h:"Freeze"}, {t:"Containment", h:"Stop"}, {t:"Truman Doctrine", h:"Money"}, 
            {t:"Marshall Plan", h:"Rebuild"}, {t:"NATO", h:"North"}, {t:"Warsaw Pact", h:"East"}, 
            {t:"Proxy War", h:"Substitute"}, {t:"Korean War", h:"Parallel"}, {t:"Vietnam War", h:"Domino"}, 
            {t:"Cuban Missile Crisis", h:"Thirteen"}, {t:"Non-Aligned Movement", h:"Neutral"}, {t:"Decolonization", h:"Freedom"}, 
            {t:"Partition of India", h:"Borders"}, {t:"Nelson Mandela", h:"Robben"}, {t:"Apartheid", h:"Segregation"}, 
            {t:"Ho Chi Minh", h:"Uncle"}, {t:"Kwame Nkrumah", h:"Ghana"}, {t:"Mao Zedong", h:"Chairman"}, 
            {t:"Great Leap Forward", h:"Steel"}, {t:"Cultural Revolution", h:"Red"}, {t:"Deng Xiaoping", h:"Cats"}, 
            {t:"Mikhail Gorbachev", h:"Glasnost"}, {t:"Zionism", h:"Homeland"}
        ],
        "9": [
            {t:"Globalization", h:"Shrinking"}, {t:"Green Revolution", h:"Yields"}, {t:"Medical Innovations", h:"Penicillin"}, 
            {t:"Vaccines", h:"Polio"}, {t:"Pandemics", h:"Flu"}, {t:"Climate Change", h:"Carbon"}, 
            {t:"Kyoto Protocol", h:"Treaty"}, {t:"Knowledge Economy", h:"Data"}, {t:"Multinational Corporations", h:"Brands"}, 
            {t:"World Trade Organization", h:"Rules"}, {t:"NAFTA", h:"Blocs"}, {t:"Consumer Culture", h:"Buy"}, 
            {t:"United Nations", h:"Peacekeepers"}, {t:"Declaration of Human Rights", h:"Eleanor"}, {t:"Liberation Theology", h:"Priests"}, 
            {t:"Civil Rights Movement", h:"March"}, {t:"Greenpeace", h:"Environment"}, {t:"World Health Organization", h:"Agency"}, 
            {t:"Artificial Intelligence", h:"Turing"}, {t:"Social Media", h:"Scroll"}, {t:"Space Race", h:"Orbit"}, 
            {t:"Arab Spring", h:"Tweets"}
        ]
    };

    let g = { players: [], alive: [], term: null, currentIdx: 0, lastEjected: null, round: 1, totalImps: 0, usedInSession: [] };

    function addField(name = "") {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `
            <input type="text" class="p-in" placeholder="Agent Name" value="${name}">
            <button class="btn-del" onclick="this.parentElement.remove()">×</button>
        `;
        document.getElementById('setup-fields').appendChild(div);
    }
    
    // Default 4 players
    for(let i=0; i<4; i++) addField();

    function initGame() {
        const names = Array.from(document.querySelectorAll('.p-in')).map(i => i.value.trim().toUpperCase()).filter(n => n);
        if(names.length < 3) return alert("Requires at least 3 agents to play.");

        const min = parseInt(document.getElementById('imp-min').value);
        const max = parseInt(document.getElementById('imp-max').value);
        
        if (min > max || min >= names.length) {
            return alert("Invalid Mole parameters. Check your min/max settings.");
        }

        g.totalImps = Math.min(Math.floor(Math.random() * (max - min + 1)) + min, names.length - 1);

        const unit = document.getElementById('unit-select').value;
        const pool = (unit === 'all' ? Object.values(CED_DB).flat() : CED_DB[unit]).filter(item => !g.usedInSession.includes(item.t));
        
        if(pool.length === 0) {
            alert("All terms in this unit exhausted! Resetting the term memory bank.");
            g.usedInSession = [];
            return initGame();
        }

        g.term = pool[Math.floor(Math.random() * pool.length)];
        g.usedInSession.push(g.term.t);

        g.players = names.map(n => ({ name: n, role: 'Civilian' }));
        g.alive = [...Array(names.length).keys()];
        g.round = 1;
        
        let assigned = 0;
        while(assigned < g.totalImps) {
            let r = Math.floor(Math.random() * names.length);
            if(g.players[r].role !== 'Mole') {
                g.players[r].role = 'Mole';
                assigned++;
            }
        }
        g.currentIdx = 0; 
        showPass();
    }

    function showPass() {
        showScreen('pass');
        document.getElementById('pass-name').innerText = g.players[g.currentIdx].name;
    }

    function revealRole() {
        showScreen('secret');
        const box = document.getElementById('role-card');
        const p = g.players[g.currentIdx];
        if(p.role === 'Mole') {
            box.innerHTML = `
                <h2 style="color:var(--red); font-weight: 800; margin:0;">THE MOLE</h2>
                <p class="subtitle" style="margin-top: 10px;">Intercepted Hint</p>
                <h1 style="font-size:2.8rem; margin: 10px 0;">${g.term.h}</h1>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Blend in. Fake it.</p>
            `;
        } else {
            box.innerHTML = `
                <h2 style="color:var(--green); font-weight: 800; margin:0;">HISTORIAN</h2>
                <p class="subtitle" style="margin-top: 10px;">Target Concept</p>
                <h1 style="font-size:2.2rem; margin: 10px 0;">${g.term.t}</h1>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Describe it safely.</p>
            `;
        }
    }

    function nextSecret() {
        g.currentIdx++;
        if(g.currentIdx < g.players.length) {
            showPass();
        } else { 
            // Random Start Mechanic
            g.currentIdx = Math.floor(Math.random() * g.alive.length);
            showScreen('debate'); 
            updateDebate(); 
        }
    }

    function updateDebate() {
        const pIdx = g.alive[g.currentIdx % g.alive.length];
        document.getElementById('speaker-name').innerText = g.players[pIdx].name;
        document.getElementById('round-tag').innerText = `ROUND ${g.round}`;
    }

    function nextSpeaker() {
        g.currentIdx++;
        if(g.currentIdx >= g.alive.length) { g.round++; g.currentIdx = 0; }
        updateDebate();
    }

    function showVoting() {
        showScreen('voting');
        const list = document.getElementById('vote-list');
        list.innerHTML = '';
        g.alive.forEach(idx => {
            const b = document.createElement('button');
            b.innerText = g.players[idx].name;
            b.onclick = () => eject(idx);
            list.appendChild(b);
        });
    }

    function eject(idx) {
        g.lastEjected = idx;
        showScreen('result');
        const p = g.players[idx];
        document.getElementById('res-name').innerText = p.name;
        const status = document.getElementById('res-status');
        
        const btnKeepGoing = document.getElementById('btn-keep-going');
        const btnNextRound = document.getElementById('btn-next-round');

        if(p.role === 'Mole') {
            status.innerText = "WAS THE MOLE";
            status.style.color = "var(--red)";
            document.getElementById('res-desc').innerText = `Threat neutralized. The historical concept was: ${g.term.t}`;
            
            btnKeepGoing.style.display = 'none';
            btnNextRound.style.display = 'block';
        } else {
            status.innerText = "WAS INNOCENT";
            status.style.color = "var(--green)";
            document.getElementById('res-desc').innerText = `A true historian was ejected. The Mole remains active.`;
            
            btnKeepGoing.style.display = 'block';
            btnNextRound.style.display = 'none';
        }
    }

    function keepGoing() {
        g.alive = g.alive.filter(idx => idx !== g.lastEjected);
        
        if(g.alive.length <= 2) {
            alert("Not enough agents remaining to call a vote. THE MOLE WINS.");
            reset();
            return;
        }

        g.currentIdx = Math.floor(Math.random() * g.alive.length);
        showScreen('debate');
        updateDebate();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function reset() {
        showScreen('setup');
    }
</script>
</body>
</html>
