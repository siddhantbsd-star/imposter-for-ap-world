<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Imposter">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/0d1117/ff4444?text=IMP">

    <title>Imposter: AP World</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --text: #c9d1d9;
            --red: #ff4444; --green: #2ea043; --blue: #58a6ff; --border: #30363d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        #app { width: 100%; max-width: 480px; background: var(--panel); border-radius: 24px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .screen { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        h1 { margin: 0; font-size: 1.8rem; color: white; text-transform: uppercase; }
        .subtitle { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; }
        input, select { background: var(--bg); border: 2px solid var(--border); color: white; padding: 15px; border-radius: 14px; font-size: 1rem; width: 100%; }
        .player-row { display: flex; gap: 8px; margin-bottom: 5px; }
        .btn-remove { background: #21262d; color: var(--red); border: 1px solid var(--border); width: 50px; border-radius: 12px; cursor: pointer; }
        button { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        button:active { transform: scale(0.97); opacity: 0.8; }
        .btn-success { background: var(--green); }
        .btn-danger { background: var(--red); }
        .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .card { background: var(--bg); border: 2px dashed var(--border); padding: 30px; border-radius: 20px; text-align: center; }
        .tag { background: #1f2428; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; color: var(--blue); font-weight: bold; align-self: center; }
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #setup-fields { max-height: 250px; overflow-y: auto; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="setup" class="screen active">
        <h1>IMPOSTER</h1>
        <p class="subtitle">Unit Selection</p>
        <select id="unit-select">
            <option value="all">Mixed (Units 1-9)</option>
            <option value="1-2">Units 1-2: Trade</option>
            <option value="3-4">Units 3-4: Empires</option>
            <option value="5-6">Units 5-6: Industrial</option>
            <option value="7-9">Units 7-9: Modern</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label class="subtitle">Imposters</label><input type="number" id="imp-count" value="1" min="1"></div>
        </div>
        <div id="setup-fields"></div>
        <button class="btn-sec" onclick="addField()">+ Add Player</button>
        <button class="btn-success" onclick="initGame()">Start Session</button>
    </div>

    <div id="pass" class="screen">
        <p class="subtitle">Pass Device To:</p>
        <h1 id="pass-name" style="color: var(--blue); font-size: 2.2rem;"></h1>
        <div class="card"><p>Private role assignment. Keep screen hidden.</p></div>
        <button onclick="revealRole()">View Intel</button>
    </div>

    <div id="secret" class="screen">
        <div id="role-card" class="card"></div>
        <button class="btn-sec" onclick="nextSecret()">Intel Secured</button>
    </div>

    <div id="debate" class="screen">
        <div id="round-tag" class="tag">ROUND 1</div>
        <p class="subtitle">Current Speaker:</p>
        <h1 id="speaker-name" style="color: var(--blue);"></h1>
        <div class="card">Describe your word subtly. The Mole only has a one-word hint.</div>
        <button onclick="nextSpeaker()">Next Player</button>
        <button class="btn-danger" onclick="showVoting()" style="margin-top:20px;">Start Vote</button>
        <button class="btn-sec" onclick="reset()" style="margin-top:20px; font-size: 0.7rem; opacity:0.6;">Emergency Reset</button>
    </div>

    <div id="voting" class="screen">
        <h1>VOTING</h1>
        <p class="subtitle">Eject the suspect</p>
        <div id="vote-list" class="vote-grid"></div>
        <button class="btn-sec" onclick="showScreen('debate')">Cancel</button>
    </div>

    <div id="result" class="screen">
        <h1 id="res-header">EJECTED</h1>
        <div class="card">
            <h2 id="res-name"></h2>
            <div id="res-status" style="font-weight:900; font-size: 1.4rem; margin:10px 0;"></div>
            <p id="res-desc" style="color: #8b949e; font-size: 0.9rem;"></p>
        </div>
        <div id="branch-choices" style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-keep-going" class="btn-sec" onclick="keepGoing()">Keep Searching</button>
            <button class="btn-success" onclick="reset()">New Game</button>
        </div>
    </div>
</div>

<script>
    const CED_DB = {
        "1-2": [{t:"Champa Rice",h:"Slopes"},{t:"The Mongols",h:"Yurts"},{t:"Silk Road",h:"Bactrian"},{t:"Mansa Musa",h:"Salt"},{t:"Grand Canal",h:"Barges"}],
        "3-4": [{t:"Janissaries",h:"Tribute"},{t:"Columbian Exchange",h:"Syphilis"},{t:"Mercantilism",h:"Tariffs"},{t:"Casta System",h:"Painting"},{t:"Mughal Empire",h:"Maratha"}],
        "5-6": [{t:"Social Darwinism",h:"Skull"},{t:"Meiji Restoration",h:"Diet"},{t:"Berlin Conference",h:"Straight-edge"},{t:"Boxer Rebellion",h:"Eight-Nation"},{t:"Industrialization",h:"Coal"}],
        "7-9": [{t:"The Cold War",h:"Curtain"},{t:"Green Revolution",h:"Borlaug"},{t:"Great Leap Forward",h:"Steel"},{t:"Proxy Wars",h:"Angola"},{t:"Apartheid",h:"Homelands"}]
    };

    let g = { players: [], alive: [], term: null, round: 1, currentIdx: 0, lastEjectedIdx: null };

    function addField(name = "") {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="p-in" placeholder="Name" value="${name}"><button class="btn-remove" onclick="this.parentElement.remove()">×</button>`;
        document.getElementById('setup-fields').appendChild(div);
    }
    for(let i=0; i<4; i++) addField();

    function initGame() {
        const names = Array.from(document.querySelectorAll('.p-in')).map(i => i.value.trim().toUpperCase()).filter(n => n);
        if(names.length < 3) return alert("Min 3 players!");

        const totalImps = Math.min(parseInt(document.getElementById('imp-count').value), names.length - 2);

        g.players = names.map(n => ({ name: n, role: 'Citizen' }));
        g.alive = [...Array(names.length).keys()];
        
        let assigned = 0;
        while(assigned < totalImps) {
            let r = Math.floor(Math.random() * names.length);
            if(g.players[r].role !== 'Imposter') {
                g.players[r].role = 'Imposter';
                assigned++;
            }
        }

        const uVal = document.getElementById('unit-select').value;
        const pool = uVal === 'all' ? Object.values(CED_DB).flat() : CED_DB[uVal];
        g.term = pool[Math.floor(Math.random() * pool.length)];
        
        g.round = 1; 
        g.currentIdx = 0; // Role reveal always starts at 0
        showPass();
    }

    function showPass() {
        showScreen('pass');
        document.getElementById('pass-name').innerText = g.players[g.currentIdx].name;
    }

    function revealRole() {
        showScreen('secret');
        const box = document.getElementById('role-card');
        const p = g.players[g.currentIdx];
        if(p.role === 'Imposter') {
            box.innerHTML = `<h2 style="color:var(--red)">IMPOSTER</h2><p class="subtitle">Cryptic Hint</p><h1 style="color:white; font-size: 3rem;">${g.term.h}</h1>`;
        } else {
            box.innerHTML = `<h2 style="color:var(--green)">CITIZEN</h2><p class="subtitle">Secret Intel</p><h1 style="color:white; font-size: 2rem;">${g.term.t}</h1>`;
        }
    }

    function nextSecret() {
        g.currentIdx++;
        if(g.currentIdx < g.players.length) showPass();
        else { 
            // Randomize who starts the debate
            g.currentIdx = Math.floor(Math.random() * g.alive.length);
            showScreen('debate'); 
            updateDebate(); 
        }
    }

    function updateDebate() {
        const pIdx = g.alive[g.currentIdx % g.alive.length];
        document.getElementById('speaker-name').innerText = g.players[pIdx].name;
        document.getElementById('round-tag').innerText = `ROUND ${g.round}`;
    }

    function nextSpeaker() {
        g.currentIdx++;
        if(g.currentIdx >= g.alive.length) { 
            g.round++; 
            g.currentIdx = 0; 
        }
        updateDebate();
    }

    function showVoting() {
        showScreen('voting');
        const list = document.getElementById('vote-list');
        list.innerHTML = '';
        g.alive.forEach(idx => {
            const b = document.createElement('button');
            b.innerText = g.players[idx].name;
            b.onclick = () => eject(idx);
            list.appendChild(b);
        });
    }

    function eject(idx) {
        g.lastEjectedIdx = idx;
        showScreen('result');
        const p = g.players[idx];
        document.getElementById('res-name').innerText = p.name;
        const status = document.getElementById('res-status');
        const keepBtn = document.getElementById('btn-keep-going');
        
        if(p.role === 'Imposter') {
            document.getElementById('res-header').innerText = "IMPOSTER DETECTED";
            status.innerText = "GAME OVER";
            status.style.color = "var(--red)";
            keepBtn.style.display = "none";
            document.getElementById('res-desc').innerText = "Mole identified. Intelligence secure.";
        } else {
            document.getElementById('res-header').innerText = "EJECTION FAILED";
            status.innerText = "WAS A CITIZEN";
            status.style.color = "var(--green)";
            keepBtn.style.display = "block";
            document.getElementById('res-desc').innerText = "The Imposter is still among you.";
        }
    }

    function keepGoing() {
        g.alive = g.alive.filter(idx => idx !== g.lastEjectedIdx);
        // Randomize the next speaker from those still alive
        g.currentIdx = Math.floor(Math.random() * g.alive.length);
        showScreen('debate');
        updateDebate();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function reset() {
        const names = Array.from(document.querySelectorAll('.p-in')).map(i => i.value);
        document.getElementById('setup-fields').innerHTML = '';
        names.forEach(n => addField(n));
        showScreen('setup');
    }
</script>
</body>
</html>
