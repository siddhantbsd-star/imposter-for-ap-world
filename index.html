<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AP World: Heimler Edition</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --text: #c9d1d9; --red: #ff4444; --green: #2ea043; --blue: #58a6ff; --border: #30363d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 480px; background: var(--panel); border-radius: 24px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .screen { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        h1 { margin: 0; font-size: 1.6rem; color: white; text-transform: uppercase; text-align: center; }
        .subtitle { color: #8b949e; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; text-align: center; }
        .left-label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        input, select { background: var(--bg); border: 2px solid var(--border); color: white; padding: 15px; border-radius: 14px; width: 100%; font-size: 1rem; }
        button { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        button:active:not(:disabled) { transform: scale(0.98); opacity: 0.8; }
        button:disabled { cursor: not-allowed; }
        .btn-success { background: var(--green); }
        .btn-danger { background: var(--red); }
        .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .card { background: var(--bg); border: 2px dashed var(--border); padding: 30px; border-radius: 20px; text-align: center; }
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #setup-fields { max-height: 200px; overflow-y: auto; margin: 10px 0; border: 1px solid var(--border); border-radius: 10px; padding: 5px; }
        .player-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-del { background: #21262d; color: var(--red); width: 45px; border: 1px solid var(--border); padding: 0; border-radius: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="setup" class="screen active">
        <h1>AP WORLD: BALL KNOWLEDGE</h1>
        <p class="subtitle">Heimler Core Vocabulary</p>
        
        <select id="unit-select">
            <option value="all">Full Exam Review (1-9)</option>
            <option value="1">Unit 1: Global Tapestry</option>
            <option value="2">Unit 2: Exchange Networks</option>
            <option value="3">Unit 3: Land Empires</option>
            <option value="4">Unit 4: Transoceanic Interconnections</option>
            <option value="5">Unit 5: Revolutions</option>
            <option value="6">Unit 6: Imperialism</option>
            <option value="7">Unit 7: Global Conflict</option>
            <option value="8">Unit 8: Cold War & Decolonization</option>
            <option value="9">Unit 9: Globalization</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label class="left-label">Min Moles</label>
                <input type="number" id="imp-min" value="1" min="1">
            </div>
            <div style="flex:1">
                <label class="left-label">Max Moles</label>
                <input type="number" id="imp-max" value="1" min="1">
            </div>
        </div>

        <div id="setup-fields"></div>
        <button class="btn-sec" onclick="addField()">+ Add Player</button>
        <button class="btn-success" onclick="initGame()">Start Round</button>
    </div>

    <div id="pass" class="screen">
        <p class="subtitle">Hand Device To:</p>
        <h1 id="pass-name" style="color: var(--blue); font-size: 2.5rem;"></h1>
        <button onclick="revealRole()">View My Intel</button>
    </div>

    <div id="secret" class="screen">
        <div id="role-card" class="card"></div>
        <button class="btn-sec" onclick="nextSecret()">Intel Secured</button>
    </div>

    <div id="debate" class="screen">
        <div id="round-tag" style="background:#1f2428; padding:5px 10px; border-radius:8px; font-size:0.7rem; align-self:center; font-weight:bold;">ROUND 1</div>
        <p class="subtitle">Currently Speaking:</p>
        <h1 id="speaker-name" style="color: var(--blue);"></h1>
        <div class="card">Describe the concept without saying its name.</div>
        <button onclick="nextSpeaker()">End My Turn</button>
        <button id="vote-btn" class="btn-danger" onclick="showVoting()" style="margin-top:15px;">Call Ejection Vote</button>
        
        <button class="btn-sec" onclick="reset()" style="margin-top:20px; font-size: 0.7rem; opacity:0.6; padding: 10px;">Emergency Reset</button>
    </div>

    <div id="voting" class="screen">
        <h1>VOTING</h1>
        <p class="subtitle">Who is the Mole?</p>
        <div id="vote-list" class="vote-grid"></div>
        <button class="btn-sec" onclick="showScreen('debate')">Back to Debate</button>
    </div>

    <div id="result" class="screen">
        <h1 id="res-header">RESULTS</h1>
        <div class="card">
            <h2 id="res-name"></h2>
            <div id="res-status" style="font-weight:900; font-size: 1.5rem; margin:10px 0;"></div>
            <p id="res-desc" style="color: #8b949e;"></p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-keep-going" class="btn-sec" onclick="keepGoing()">Continue Investigation</button>
            <button id="btn-next-round" class="btn-success" onclick="initGame()">Next Keyword</button>
            <button class="btn-sec" onclick="reset()" style="font-size:0.7rem; opacity:0.6;">Quit to Menu</button>
        </div>
    </div>
</div>

<script>
    // Essential AP World "Ball Knowledge" Concepts (Heimler Focus)
    const CED_DB = {
        "1": [
            {t:"Song Dynasty", h:"Meritocracy"}, {t:"Confucianism", h:"Filial"}, {t:"Champa Rice", h:"Yield"}, 
            {t:"Dar al-Islam", h:"Expansion"}, {t:"House of Wisdom", h:"Translation"}, {t:"Mali Empire", h:"Gold"}, 
            {t:"Mansa Musa", h:"Hajj"}, {t:"Inca Empire", h:"Roads"}, {t:"Mit'a System", h:"Compulsory"}, 
            {t:"Aztec Empire", h:"Tribute"}, {t:"Feudalism", h:"Decentralized"}, {t:"Serfdom", h:"Coerced"}, 
            {t:"Great Zimbabwe", h:"Enclosure"}, {t:"Bhakti Movement", h:"Devotion"}, {t:"Sufism", h:"Mystic"}, 
            {t:"Theravada Buddhism", h:"Monastic"}, {t:"Grand Canal", h:"Internal"}, {t:"Seljuk Empire", h:"Turks"}, 
            {t:"Delhi Sultanate", h:"Jizya"}, {t:"Civil Service Exam", h:"Scholars"}
        ],
        "2": [
            {t:"Silk Roads", h:"Luxury"}, {t:"Caravanserai", h:"Inn"}, {t:"Mongol Empire", h:"Horde"}, 
            {t:"Pax Mongolica", h:"Security"}, {t:"Indian Ocean Trade", h:"Monsoon"}, {t:"Lateen Sail", h:"Wind"}, 
            {t:"Astrolabe", h:"Navigation"}, {t:"Trans-Saharan Trade", h:"Camel"}, {t:"Zheng He", h:"Treasure"}, 
            {t:"Ibn Battuta", h:"Rihla"}, {t:"Marco Polo", h:"Court"}, {t:"Black Death", h:"Pathogen"}, 
            {t:"Swahili City-States", h:"Diaspora"}, {t:"Paper Money", h:"Currency"}, {t:"Magnetic Compass", h:"Direction"}, 
            {t:"Kashgar", h:"Oasis"}, {t:"Sternpost Rudder", h:"Shipbuilding"}, {t:"Hanseatic League", h:"Guild"}, 
            {t:"Genghis Khan", h:"Unification"}, {t:"Saddle", h:"Riding"}
        ],
        "3": [
            {t:"Gunpowder Empires", h:"Cannons"}, {t:"Ottoman Empire", h:"Constantinople"}, {t:"Devshirme", h:"Tribute"}, 
            {t:"Janissaries", h:"Elite"}, {t:"Safavid Empire", h:"Shi'a"}, {t:"Mughal Empire", h:"Taj"}, 
            {t:"Divine Right", h:"Absolutism"}, {t:"Versailles", h:"Legitimacy"}, {t:"Tokugawa Shogunate", h:"Isolation"}, 
            {t:"Samurai", h:"Salaried"}, {t:"Qing Dynasty", h:"Manchu"}, {t:"Protestant Reformation", h:"Indulgences"}, 
            {t:"Catholic Counter-Reformation", h:"Jesuits"}, {t:"Sikhism", h:"Syncretic"}, {t:"Tax Farming", h:"Revenue"}, 
            {t:"Tribute System", h:"Submission"}, {t:"Peter the Great", h:"Westernization"}, {t:"Sunni-Shi'a Split", h:"Rivalry"}, 
            {t:"Bureaucracy", h:"Administration"}, {t:"Monumental Architecture", h:"Power"}
        ],
        "4": [
            {t:"Columbian Exchange", h:"Biota"}, {t:"Mercantilism", h:"Exports"}, {t:"Joint-Stock Company", h:"Investment"}, 
            {t:"Trading Post Empire", h:"Dutch"}, {t:"Encomienda System", h:"Labor"}, {t:"Hacienda System", h:"Agriculture"}, 
            {t:"Chattel Slavery", h:"Property"}, {t:"Middle Passage", h:"Voyage"}, {t:"Casta System", h:"Hierarchy"}, 
            {t:"Silver Trade", h:"Inflation"}, {t:"Smallpox", h:"Demographic"}, {t:"Sugar Plantations", h:"Cash"}, 
            {t:"Maritime Empires", h:"Oceanic"}, {t:"Fluyt", h:"Cargo"}, {t:"Vasco da Gama", h:"Route"}, 
            {t:"Christopher Columbus", h:"Sponsorship"}, {t:"Maroon Societies", h:"Resistance"}, {t:"Vodun", h:"Syncretism"}, 
            {t:"Creoles", h:"American"}, {t:"Treaty of Tordesillas", h:"Line"}
        ],
        "5": [
            {t:"Enlightenment", h:"Reason"}, {t:"Natural Rights", h:"Locke"}, {t:"Social Contract", h:"Agreement"}, 
            {t:"Nationalism", h:"Identity"}, {t:"American Revolution", h:"Taxation"}, {t:"French Revolution", h:"Estates"}, 
            {t:"Haitian Revolution", h:"Rebellion"}, {t:"Industrial Revolution", h:"Mechanization"}, {t:"Factory System", h:"Specialization"}, 
            {t:"Steam Engine", h:"Coal"}, {t:"Meiji Restoration", h:"Modernization"}, {t:"Capitalism", h:"Free"}, 
            {t:"Adam Smith", h:"Wealth"}, {t:"Karl Marx", h:"Proletariat"}, {t:"Socialism", h:"Means"}, 
            {t:"Labor Unions", h:"Collective"}, {t:"Seneca Falls Convention", h:"Suffrage"}, {t:"Taiping Rebellion", h:"Uprising"}, 
            {t:"Simon Bolivar", h:"Jamaica"}, {t:"Urbanization", h:"Migration"}
        ],
        "6": [
            {t:"Imperialism", h:"Domination"}, {t:"Social Darwinism", h:"Justification"}, {t:"Scramble for Africa", h:"Partition"}, 
            {t:"Berlin Conference", h:"Borders"}, {t:"Settler Colony", h:"Displacement"}, {t:"Economic Imperialism", h:"Influence"}, 
            {t:"Export Economy", h:"Raw"}, {t:"Opium Wars", h:"Spheres"}, {t:"Sepoy Mutiny", h:"Cartridges"}, 
            {t:"King Leopold II", h:"Rubber"}, {t:"Suez Canal", h:"Chokepoint"}, {t:"Monroe Doctrine", h:"Hemisphere"}, 
            {t:"Indentured Servitude", h:"Contracts"}, {t:"Chinese Exclusion Act", h:"Nativism"}, {t:"White Australia Policy", h:"Restriction"}, 
            {t:"Ghost Dance", h:"Revitalization"}, {t:"Xhosa Cattle-Killing", h:"Prophecy"}, {t:"Banana Republics", h:"Corporations"}, 
            {t:"Civilizing Mission", h:"Burden"}, {t:"Cecil Rhodes", h:"Diamonds"}
        ],
        "7": [
            {t:"Total War", h:"Mobilization"}, {t:"Trench Warfare", h:"Stalemate"}, {t:"Treaty of Versailles", h:"Reparations"}, 
            {t:"League of Nations", h:"Collective"}, {t:"Great Depression", h:"Crash"}, {t:"Fascism", h:"Authoritarian"}, 
            {t:"Totalitarianism", h:"Control"}, {t:"Russian Revolution", h:"Bolsheviks"}, {t:"Joseph Stalin", h:"Five-Year"}, 
            {t:"Holocaust", h:"Genocide"}, {t:"World War II", h:"Aggression"}, {t:"Atomic Bomb", h:"Devastation"}, 
            {t:"Propaganda", h:"Media"}, {t:"Armenian Genocide", h:"Deportation"}, {t:"Appeasement", h:"Concession"}, 
            {t:"Winston Churchill", h:"Speech"}, {t:"Adolf Hitler", h:"Expansion"}, {t:"Franklin D. Roosevelt", h:"New"}, 
            {t:"Firebombing", h:"Civilian"}, {t:"League Mandates", h:"Territories"}
        ],
        "8": [
            {t:"Cold War", h:"Ideology"}, {t:"Containment", h:"Truman"}, {t:"Proxy War", h:"Indirect"}, 
            {t:"NATO", h:"Alliance"}, {t:"Warsaw Pact", h:"Bloc"}, {t:"Decolonization", h:"Independence"}, 
            {t:"Partition of India", h:"Migration"}, {t:"Non-Aligned Movement", h:"Neutrality"}, {t:"Cuban Missile Crisis", h:"Brinkmanship"}, 
            {t:"Great Leap Forward", h:"Collectivization"}, {t:"Cultural Revolution", h:"Purge"}, {t:"Apartheid", h:"Segregation"}, 
            {t:"Nelson Mandela", h:"Resistance"}, {t:"Ho Chi Minh", h:"Nationalism"}, {t:"Kwame Nkrumah", h:"Pan-African"}, 
            {t:"Mao Zedong", h:"Peasant"}, {t:"Gorbachev", h:"Restructuring"}, {t:"Iron Curtain", h:"Division"}, 
            {t:"Space Race", h:"Technology"}, {t:"Zionism", h:"State"}
        ],
        "9": [
            {t:"Globalization", h:"Interconnected"}, {t:"Green Revolution", h:"Agriculture"}, {t:"Climate Change", h:"Emissions"}, 
            {t:"Knowledge Economy", h:"Information"}, {t:"Multinational Corporation", h:"Outsourcing"}, {t:"World Trade Organization", h:"Tariffs"}, 
            {t:"Free Market", h:"Liberalization"}, {t:"Internet", h:"Communication"}, {t:"Vaccines", h:"Eradication"}, 
            {t:"Pandemics", h:"Global"}, {t:"United Nations", h:"Diplomacy"}, {t:"Human Rights", h:"Declaration"}, 
            {t:"NAFTA", h:"Regional"}, {t:"Consumerism", h:"Culture"}, {t:"Social Media", h:"Networks"}, 
            {t:"Renewable Energy", h:"Sustainable"}, {t:"Antibiotics", h:"Resistance"}, {t:"Artificial Intelligence", h:"Automation"}, 
            {t:"Greenpeace", h:"Activism"}, {t:"Medical Innovation", h:"Longevity"}
        ]
    };

    let g = { players: [], alive: [], term: null, currentIdx: 0, lastEjected: null, round: 1, totalImps: 0, usedInSession: [] };

    function addField(name = "") {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="p-in" placeholder="Student Name" value="${name}"><button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        document.getElementById('setup-fields').appendChild(div);
    }
    // Default 4 players
    for(let i=0; i<4; i++) addField();

    function initGame() {
        const names = Array.from(document.querySelectorAll('.p-in')).map(i => i.value.trim().toUpperCase()).filter(n => n);
        if(names.length < 3) return alert("Requires at least 3 players.");

        // Randomized Imposter Logic
        const min = parseInt(document.getElementById('imp-min').value);
        const max = parseInt(document.getElementById('imp-max').value);
        g.totalImps = Math.min(Math.floor(Math.random() * (max - min + 1)) + min, names.length - 2);

        const unit = document.getElementById('unit-select').value;
        const pool = (unit === 'all' ? Object.values(CED_DB).flat() : CED_DB[unit]).filter(item => !g.usedInSession.includes(item.t));
        
        if(pool.length === 0) g.usedInSession = [];
        g.term = pool[Math.floor(Math.random() * pool.length)];
        g.usedInSession.push(g.term.t);

        g.players = names.map(n => ({ name: n, role: 'Civilian' }));
        g.alive = [...Array(names.length).keys()];
        g.round = 1;
        
        let assigned = 0;
        while(assigned < g.totalImps) {
            let r = Math.floor(Math.random() * names.length);
            if(g.players[r].role !== 'Mole') {
                g.players[r].role = 'Mole';
                assigned++;
            }
        }
        g.currentIdx = 0; 
        showPass();
    }

    function showPass() {
        showScreen('pass');
        document.getElementById('pass-name').innerText = g.players[g.currentIdx].name;
    }

    function revealRole() {
        showScreen('secret');
        const box = document.getElementById('role-card');
        const p = g.players[g.currentIdx];
        if(p.role === 'Mole') {
            box.innerHTML = `<h2 style="color:var(--red)">THE MOLE</h2><p class="subtitle">Intercepted Hint</p><h1 style="font-size:2.5rem;">${g.term.h}</h1>`;
        } else {
            box.innerHTML = `<h2 style="color:var(--green)">CIVILIAN</h2><p class="subtitle">Target Concept</p><h1 style="font-size:1.8rem;">${g.term.t}</h1>`;
        }
    }

    function nextSecret() {
        g.currentIdx++;
        if(g.currentIdx < g.players.length) {
            showPass();
        } else { 
            // Random Start Mechanic
            g.currentIdx = Math.floor(Math.random() * g.alive.length);
            showScreen('debate'); 
            updateDebate(); 
        }
    }

    function updateDebate() {
        const pIdx = g.alive[g.currentIdx % g.alive.length];
        document.getElementById('speaker-name').innerText = g.players[pIdx].name;
        document.getElementById('round-tag').innerText = `ROUND ${g.round}`;
    }

    function nextSpeaker() {
        g.currentIdx++;
        if(g.currentIdx >= g.alive.length) { g.round++; g.currentIdx = 0; }
        updateDebate();
    }

    function showVoting() {
        showScreen('voting');
        const list = document.getElementById('vote-list');
        list.innerHTML = '';
        g.alive.forEach(idx => {
            const b = document.createElement('button');
            b.innerText = g.players[idx].name;
            b.onclick = () => eject(idx);
            list.appendChild(b);
        });
    }

    function eject(idx) {
        g.lastEjected = idx;
        showScreen('result');
        const p = g.players[idx];
        document.getElementById('res-name').innerText = p.name;
        const status = document.getElementById('res-status');
        
        const btnKeepGoing = document.getElementById('btn-keep-going');
        const btnNextRound = document.getElementById('btn-next-round');

        if(p.role === 'Mole') {
            status.innerText = "WAS THE MOLE";
            status.style.color = "var(--red)";
            document.getElementById('res-desc').innerText = "Mole neutralized. The concept was: " + g.term.t;
            
            // Imposter found: Hide "Continue", make sure "Next Keyword" is visible
            btnKeepGoing.style.display = 'none';
            btnNextRound.style.display = 'block';
        } else {
            status.innerText = "WAS INNOCENT";
            status.style.color = "var(--green)";
            document.getElementById('res-desc').innerText = "A civilian was ejected. The Mole is still out there.";
            
            // Innocent found: Show "Continue", hide "Next Keyword" (unless you want to abort early)
            btnKeepGoing.style.display = 'block';
            btnNextRound.style.display = 'none';
        }
    }

    function keepGoing() {
        g.alive = g.alive.filter(idx => idx !== g.lastEjected);
        
        // If game is over because 2 or fewer players remain, force a restart
        if(g.alive.length <= 2) {
            alert("Not enough players left to vote! The Mole wins.");
            reset();
            return;
        }

        g.currentIdx = Math.floor(Math.random() * g.alive.length);
        showScreen('debate');
        updateDebate();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function reset() {
        // Keeps player names but takes you back to setup
        showScreen('setup');
    }
</script>
</body>
</html>
